services:
  - type: web
    name: india-ai-stock-scanner
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-scanner.txt
    startCommand: streamlit run india_ai_stock_scanner_streamlit.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9